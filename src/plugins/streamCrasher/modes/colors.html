<!DOCTYPE html>
<html>
<head>
    <style>
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            animation: cycle 0.15s linear infinite;
        }

        @keyframes cycle {
            0%   { background: red; }
            17%  { background: orange; }
            33%  { background: yellow; }
            50%  { background: lime; }
            67%  { background: cyan; }
            83%  { background: blue; }
            100% { background: red; }
        }
    </style>
</head>
</html>
