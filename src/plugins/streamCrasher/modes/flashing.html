<!DOCTYPE html>
<html>
<head>
    <style>
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            animation: flash 0.15s linear infinite;
        }

        @keyframes flash {
            0%, 49.99% { background: #000; }
            50%, 100%  { background: #fff; }
        }
    </style>
</head>
</html>
